steps:
  # Build the container image using the Dockerfile and passing build-time variables
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--tag'
      - '$_AR_HOSTNAME/$_AR_PROJECT_ID/$_AR_REPOSITORY/$_SERVICE_NAME'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_API_KEY=$_NEXT_PUBLIC_FIREBASE_API_KEY'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_APP_ID=$_NEXT_PUBLIC_FIREBASE_APP_ID'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=$_NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=$_NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_PROJECT_ID=$_NEXT_PUBLIC_FIREBASE_PROJECT_ID'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=$_NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_API=$_NEXT_PUBLIC_FIREBASE_API'
      - '--build-arg'
      - 'NEXT_PUBLIC_BASE_URL=$_NEXT_PUBLIC_BASE_URL'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_DATABASE_URL=$_NEXT_PUBLIC_FIREBASE_DATABASE_URL'
      - '.'

  # Push the container image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '$_AR_HOSTNAME/$_AR_PROJECT_ID/$_AR_REPOSITORY/$_SERVICE_NAME']

  # Deploy the container to Cloud Run with runtime environment variables
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - '$_SERVICE_NAME'
      - '--image'
      - '$_AR_HOSTNAME/$_AR_PROJECT_ID/$_AR_REPOSITORY/$_SERVICE_NAME'
      - '--region'
      - '$_DEPLOY_REGION'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--update-env-vars'
      - 'FIREBASE_PRIVATE_KEY=$_FIREBASE_PRIVATE_KEY,GEMINI_API_KEY=$_GEMINI_API_KEY,GENERATIVE_AI_API_KEY=$_GENERATIVE_AI_API_KEY,WOS_API_KEY=$_WOS_API_KEY,SPRINGER_API_KEY=$_SPRINGER_API_KEY,SCOPUS_API_KEY=$_SCOPUS_API_KEY'

images:
  - '$_AR_HOSTNAME/$_AR_PROJECT_ID/$_AR_REPOSITORY/$_SERVICE_NAME'

options:
  logging: CLOUD_LOGGING_ONLY

substitutions:
  _AR_HOSTNAME: 'asia-south1-docker.pkg.dev'
  _DEPLOY_REGION: 'asia-south1'
  _AR_REPOSITORY: 'rdc-repo'
  _SERVICE_NAME: 'rdc-imr'
  _AR_PROJECT_ID: 'rdc-imr-emr-portal-776a7'
  _NEXT_PUBLIC_FIREBASE_API_KEY: ''
  _NEXT_PUBLIC_FIREBASE_APP_ID: ''
  _NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ''
  _NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ''
  _NEXT_PUBLIC_FIREBASE_PROJECT_ID: ''
  _NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ''
  _NEXT_PUBLIC_FIREBASE_API: ''
  _NEXT_PUBLIC_BASE_URL: ''
  _NEXT_PUBLIC_FIREBASE_DATABASE_URL: ''
  _FIREBASE_PRIVATE_KEY: ''
  _GEMINI_API_KEY: ''
  _GENERATIVE_AI_API_KEY: ''
  _WOS_API_KEY: ''
  _SPRINGER_API_KEY: ''
  _SCOPUS_API_KEY: ''
